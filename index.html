<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phone Xpress - Effet Désintégration</title>

  <style>
    :root {
      --px-blue: #1497e8;
      --px-blue-light: #48caff;
      --px-white: #ffffff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: transparent;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--px-white);
    }

    .px-hero {
      position: relative;
      width: min(1280px, 100%);
      height: 620px;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 28px;
      background: transparent;
      isolation: isolate;
    }

    .px-hero-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      z-index: 1;
      transform: scale(1.02);
      filter: contrast(1.05) saturate(1.06);
    }

    .px-vignette {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(circle at 62% 42%, rgba(20,151,232,0.10), transparent 28%),
        linear-gradient(90deg, rgba(0,0,0,0.18), transparent 34%, rgba(0,0,0,0.32));
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      pointer-events: none;
    }

    .px-glitch-line {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 58%;
      width: 2px;
      z-index: 4;
      pointer-events: none;
      background: linear-gradient(180deg, transparent, rgba(72,202,255,0.75), transparent);
      box-shadow: 0 0 24px rgba(72,202,255,0.95);
      opacity: 0.55;
      animation: pulseLine 2.8s ease-in-out infinite alternate;
    }

    .px-content {
      position: absolute;
      left: 42px;
      bottom: 42px;
      z-index: 5;
      max-width: 460px;
      padding: 22px 24px;
      border-radius: 22px;
      background: rgba(3, 12, 22, 0.55);
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(12px);
      box-shadow: inset 0 0 34px rgba(20,151,232,0.15);
    }

    .px-content span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(20,151,232,0.16);
      border: 1px solid rgba(20,151,232,0.42);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .8px;
    }

    .px-content h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 4.2vw, 64px);
      line-height: .92;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(20,151,232,.85);
    }

    .px-content p {
      margin: 0;
      color: rgba(255,255,255,.84);
      font-size: 16px;
      line-height: 1.45;
      font-weight: 700;
      text-shadow: 0 1px 2px rgba(0,0,0,.8);
    }

    @keyframes pulseLine {
      from { opacity: .25; transform: translateX(-5px); }
      to { opacity: .85; transform: translateX(5px); }
    }

    @media (max-width: 760px) {
      html, body { overflow: auto; }

      .px-hero {
        height: 520px;
        border-radius: 22px;
      }

      .px-content {
        left: 16px;
        right: 16px;
        bottom: 16px;
        max-width: none;
      }

      .px-glitch-line { left: 60%; }
    }
  </style>
</head>

<body>
  <section class="px-hero">
    <!-- Mets ton image sur GitHub avec ce nom, au même endroit que le fichier HTML -->
    <img class="px-hero-img" src="desintegration-thomas.png" alt="Thomas dans son atelier Phone Xpress" />

    <div class="px-vignette"></div>
    <div class="px-glitch-line"></div>
    <canvas id="particlesCanvas"></canvas>

    <div class="px-content">
      <span>⚡ Réparation express</span>
      <h1>Phone Xpress</h1>
      <p>Un univers visuel fort, une réparation précise, et une prise en charge directe par Thomas.</p>
    </div>
  </section>

  <script>
    const canvas = document.getElementById("particlesCanvas");
    const ctx = canvas.getContext("2d");
    const hero = document.querySelector(".px-hero");

    let particles = [];
    let width = 0;
    let height = 0;

    function resizeCanvas() {
      const rect = hero.getBoundingClientRect();
      width = rect.width;
      height = rect.height;
      canvas.width = width * window.devicePixelRatio;
      canvas.height = height * window.devicePixelRatio;
      ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
      createParticles();
    }

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createParticles() {
      particles = [];

      // Zone principale de désintégration : côté droit du personnage
      const startX = width * 0.56;
      const endX = width * 0.96;
      const startY = height * 0.10;
      const endY = height * 0.86;

      const amount = width < 700 ? 120 : 230;

      for (let i = 0; i < amount; i++) {
        const size = random(2, 8);
        const x = random(startX, endX);
        const y = random(startY, endY);

        particles.push({
          x,
          y,
          baseX: x,
          baseY: y,
          size,
          speedX: random(0.25, 1.8),
          speedY: random(-0.35, 0.55),
          rotation: random(0, Math.PI * 2),
          rotationSpeed: random(-0.035, 0.035),
          alpha: random(0.25, 0.95),
          pulse: random(0, Math.PI * 2),
          color: Math.random() > 0.34 ? "blue" : "white",
          shape: Math.random() > 0.55 ? "shard" : "dot"
        });
      }
    }

    function drawShard(p) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.globalAlpha = p.alpha;

      if (p.color === "blue") {
        ctx.fillStyle = "rgba(72,202,255,0.95)";
        ctx.shadowColor = "rgba(20,151,232,0.95)";
        ctx.shadowBlur = 14;
      } else {
        ctx.fillStyle = "rgba(255,255,255,0.78)";
        ctx.shadowColor = "rgba(255,255,255,0.45)";
        ctx.shadowBlur = 8;
      }

      if (p.shape === "shard") {
        ctx.beginPath();
        ctx.moveTo(-p.size, -p.size * 0.35);
        ctx.lineTo(p.size * 1.35, -p.size * 0.12);
        ctx.lineTo(p.size * 0.35, p.size * 0.8);
        ctx.lineTo(-p.size * 0.55, p.size * 0.4);
        ctx.closePath();
        ctx.fill();
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.size * 0.45, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);

      for (const p of particles) {
        p.x += p.speedX;
        p.y += p.speedY + Math.sin(p.pulse) * 0.06;
        p.rotation += p.rotationSpeed;
        p.pulse += 0.03;

        if (p.x > width + 40 || p.y < -40 || p.y > height + 40) {
          p.x = p.baseX + random(-14, 14);
          p.y = p.baseY + random(-14, 14);
          p.alpha = random(0.25, 0.95);
        }

        drawShard(p);
      }

      requestAnimationFrame(animate);
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();
    animate();
  </script>
</body>
</html>
